name: Keep Supabase Alive

on:
  schedule:
    # Every 5 days at 12:00 UTC. Supabase free tier pauses after 7 days
    # of inactivity, so this gives a 2-day safety margin.
    - cron: "0 12 */5 * *"
  workflow_dispatch: # Allow manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::SUPABASE_URL or SUPABASE_ANON_KEY secret is not set"
            exit 1
          fi

          # Hit a tiny endpoint that requires a real DB query — selecting one
          # row from any table is enough to register activity.
          response=$(curl --silent --show-error --fail \
            --max-time 30 \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/wishlist_item?select=id&limit=1")

          echo "Ping successful. Response: $response"
